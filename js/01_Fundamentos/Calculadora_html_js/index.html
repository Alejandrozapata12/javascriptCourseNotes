<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Basica</title>
</head>
<style>
    .container{
        background-color: rgb(53, 0, 247);
        width: 300px;
        height: 300px;
        padding: 2rem;
        border-radius: 12px;
        border: none;

        h2{
            color: white;
            text-align: center;
            font-weight: bold;
            font-family: Arial, Helvetica, sans-serif;
        }

        input{
            border: none;
            border-radius: 4px;
            padding: 3px;
            text-align: center;
        }
    }
</style>

<body>

    <div class="container">
    <h2>Calculadora Basica</h2>

    <input type="number" id="num1" placeholder="Número 1">
    <br><br>

    <input type="number" id="num2" placeholder="Número 2">
    <br><br>

    <button onclick="calcular('+')">+</button>
    <button onclick="calcular('-')">-</button>
    <button onclick="calcular('*')">*</button>
    <button onclick="calcular('/')">/</button>

    <h3 id="resultado"></h3>
</div>
    <script>
        function calcular(operacion){
            let num1 = Number(document.getElementById("num1").value);
            let num2 = Number(document.getElementById("num2").value);

            let resultado;

            if(operacion === "+"){
                resultado = num1 + num2;
            }else if(operacion === "-"){
                resultado = num1 - num2;
            }else if(operacion === "*"){
                resultado = num1 * num2;
            }else if(operacion === "/"){
                resultado = num1 / num2;
            }

            document.getElementById("resultado").innerText = "Resultado: " + resultado;
        }
    </script>

</body>

</html>
