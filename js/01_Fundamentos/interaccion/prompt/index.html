<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interacción - prompt()</title>
</head>
<body>
    
    <script>
        'use strict';

    let age = Number(prompt("¿Cual es tu edad?"));
    alert(`Tienes ${age} años de edad!`);
    </script>
</body>
</html>
