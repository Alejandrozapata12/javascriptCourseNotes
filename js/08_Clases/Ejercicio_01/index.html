<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ejercici 1 -> Sintaxis</title>
</head>
<style>
  body {
    font-family: Arial, Helvetica, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  input {
    padding: 10px;
    border-radius: 5px;
    border: 1px solid #ccc;
  }

  button {
    padding: 10px 20px;
    border-radius: 5px;
    border: none;
    background-color: #007BFF;
    color: white;
    cursor: pointer;
  }

  button:hover {
    background-color: #0056b3;
  }

  p {
    font-size: 18px;
    color: #333;
  }
</style>

<body>

  <p>Ahora mismo en todos los productos estamos dando un descuento del 20%</p>
  <input type="text" name="product" id="product" placeholder="Escribe el producto:">
  <input type="number" name="price" id="price" placeholder="Escribe el precio:">
  <button id="add">Agregar producto</button>
  <div id="demo"></div>

  <script>
    const product = document.getElementById('product');
    const price = document.getElementById('price');
    const addButton = document.getElementById('add');
    const demo = document.getElementById('demo');

    addButton.addEventListener('click', () => {
      const productName = product.value;
      const productPrice = parseFloat(price.value);

      class Producto {
        constructor(nombre, precio) {
          this.nombre = nombre;
          this.precio = precio;
        }

        getformattedPrice() {
          return `$${this.precio.toFixed(2)}`;
        }

        applyDiscount(porcentaje) {
          this.precio -= this.precio * (porcentaje / 100);
        }
      }

      const nuevoProducto = new Producto(productName, productPrice);
      nuevoProducto.applyDiscount(20);
      const discountedPrice = nuevoProducto.getformattedPrice();
      demo.innerHTML = `<p>Producto: ${nuevoProducto.nombre}</p><p>Descuento: 20%</p><p>Precio con descuento: ${discountedPrice}</p>`;
    });




  </script>
</body>

</html>
