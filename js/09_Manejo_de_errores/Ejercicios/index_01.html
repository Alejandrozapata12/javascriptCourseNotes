<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio_1 try catch</title>

    <style>
        body {
            background: #111;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial;
        }

        .box {
            background: #222;
            padding: 20px;
            border-radius: 12px;
            width: 350px;
            text-align: center;
        }

        textarea {
            width: 100%;
            height: 100px;
            margin-bottom: 10px;
            border-radius: 8px;
            padding: 10px;
        }

        button {
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: #007BFF;
            color: white;
            cursor: pointer;
        }

        .result {
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
        }

        .ok {
            background: green;
        }

        .error {
            background: crimson;
        }
    </style>
</head>

<body>


    <div class="box">
        <h3>Procesar Usuario (JSON)</h3>

        <textarea id="input">
          {"nombre":"Alejandro","edad":25}
        </textarea>

        <button id="btn">Procesar</button>
        <div id="output" class="result"></div>
    </div>

    <script>
        const btn = document.getElementById("btn");
        const input = document.getElementById("input");
        const output = document.getElementById("output");

        function procesarUsuario(json) {
            try {
                // 🔥 1. Parsear JSON
                const user = JSON.parse(json);

                // 🔥 2. Validar propiedades
                if (!user.nombre || user.edad === undefined) {
                    throw new Error("Faltan propiedades");
                }

                // 🔥 3. Validar edad
                if (typeof user.edad !== "number" || user.edad < 0) {
                    throw new Error("Edad inválida");
                }

                // ✔ todo bien
                return user;

            } catch (err) {

                // 🔥 Diferenciar tipo de error
                if (err instanceof SyntaxError) {
                    throw new Error("JSON inválido");
                }

                // otros errores
                throw err;
            }
        }

        btn.addEventListener("click", () => {
            try {
                const result = procesarUsuario(input.value);

                output.className = "result ok";
                output.textContent = `✔ Usuario válido: ${result.nombre}, ${result.edad}`;

            } catch (err) {

                output.className = "result error";
                output.textContent = `❌ Error: ${err.message}`;
            }
        });



    </script>

</body>

</html>
