<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Errores personalizados</title>

    <style>
  * {
  padding: 0;
  margin: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, Helvetica, sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}


.container {
  width: 350px;
  background: #1e293b;
  padding: 2rem;
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  display: flex;
  flex-direction: column;
  gap: 1rem;
}


.container input {
  padding: 0.7rem;
  border-radius: 8px;
  border: 1px solid #334155;
  background: #0f172a;
  color: #fff;
  outline: none;
  transition: 0.3s;
}

.container input::placeholder {
  color: #94a3b8;
}

.container input:focus {
  border-color: #3b82f6;
  box-shadow: 0 0 5px #3b82f6;
}


#btn {
  padding: 0.7rem;
  border-radius: 10px;
  border: none;
  background: #3b82f6;
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

#btn:hover {
  background: #2563eb;
  transform: translateY(-2px);
}


#demo {
  text-align: center;
  padding: 0.6rem;
  border-radius: 8px;
  font-size: 14px;
}

.success {
  background: #16a34a;
  color: white;
}

.error {
  background: #dc2626;
  color: white;
}



    </style>
</head>
<body>
    <div class="container">
    <input type="text" id="nme" placeholder="Name....">
    <p id="demo"></p>
    <button id="btn">Submit</button>
</div>

    <script>
        const inp = document.getElementById("nme");
        const prin = document.getElementById("demo");
        const btn = document.getElementById("btn");

        class ValidadorN extends Error {
            constructor(message){
               super(message);
               this.name = "ValidationError";
            }
        }

        function validarNombre(nombre){
    if (!nombre || nombre.trim() === "") {
        throw new ValidadorN("Name required");
    }

    if (nombre.length < 3) {
        throw new ValidadorN("Name must be at least 3 characters");
    }

    if (nombre.length > 20) {
        throw new ValidadorN("Name must be less than 20 characters");
    }

    const regex = /^[a-zA-Z\s]+$/;

    if (!regex.test(nombre)) {
        throw new ValidadorN("Only letters are allowed");
    }

    return nombre;
}

        // 🔥 Evento
        btn.addEventListener("click", () => {
            try {
                const nombre = inp.value; // ✔ tomar valor actual
                const resultado = validarNombre(nombre);

                prin.textContent = "✔ Valid name: " + resultado;
                prin.className = "success";
            } catch (error) {
                prin.textContent = "❌ " + error.message;
                prin.className = "error";
            }
        });
    </script>

</body>
</html>
